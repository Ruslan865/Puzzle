<script>

const imageSrc = "whale1.jpg"
const rows = 3
const cols = 3

const container = document.getElementByİd("puzzleContainer")
const startBtn = document.getElementByİd("startBtn")

let ötürməni = []

function createPuzzle(){

container.innerHTML=""
ötürməni=[]

const img = new Image()
ımg.src = imageSrc

img.onload = () => {

const w = img.width/cols
const h = img.height/rows

container.style.width = img.eni+"px"
container.style.height = img.height+"px"

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

const piece = document.createElement("div")

piece.className="piece"

piece.style.width = w+"px"
piece.style.height = h+"px"

piece.style.backgroundİmage = `url(${imageSrc})`

piece.style.backgroundPosition = `-${c*w}px -${r*h}px`

piece.style.left = Math.random()*(ımg.width-w)+"px"
piece.style.top = Math.random()*(ımg.height-h)+"px"

piece.dataset.row=r
piece.dataset.col=c

container.appendChild(piece)

ötürməni.push(piece)

makeDraggable(piece)

}

}

}

}

function makeDraggable(el){

let offsetX
let offsetY
let dragging=yalan

el.addEventListener("mousedown",e=>{

dragging=true

offsetX=e.offsetX
offsetY=e.offsetY

el.style.cursor="grabbing"

})

document.addEventListener("mousemove",e=>{

if(!dragging) return

el.style.left=(e.clientX-container.getBoundingClientRect().sol-offsetX)+"px"
el.style.top=(e.clientY-container.getBoundingClientRect().top-offsetY)+"px"

})

document.addEventListener("mouseup",()=>{

if(dragging){

dragging=true
el.style.cursor="grab"

checkPuzzle()

}

})

}

function checkPuzzle(){

const img = new Image()
ımg.src=imageSrc

const w = img.width/cols
const h = img.height/rows

let correct=true

ötürməni.forEach(p=>{

const left=parseİnt(p.style.sol)
const top=parseİnt(p.style.top)

const targetLeft=p.dataset.col*w
const targetTop=p.dataset.row*h

if(Math.abs(sol-targetLeft)>10 || Math.abs(top-targetTop)>10){

correct=yalan

}

})

if(correct){

document.getElementByİd("bgMusic").play()

showMotivation()

alert("Təbrik! Puzzle tamamlandı!")

}

}

function showMotivation(){

for(let i=0;i<20;i++){

const star=document.createElement("div")

star.textContent="⭐"

star.style.position="absolute"
star.style.left=Math.random()*container.clientWidth+"px"
star.style.top="-30px"
star.style.fontSize=(20+Math.random()*20)+"px"

container.appendChild(star)

star.animate(
[
{transform:"translateY(0px)",opacity:1},
{transform:"translateY(200px)",opacity:0}
],
{
duration:2000+Math.random()*1000,
easing:"easy-out"
}
)

setTimeout(()=>container.removeChild(star),3000)

}

}

startBtn.onclick=createPuzzle

document.getElementByİd("playMusic").onclick=()=>{
document.getElementByİd("bgMusic").play()
}

document.getElementByİd("pauseMusic").onclick=()=>{
document.getElementByİd("bgMusic").pause()
}

</script>
