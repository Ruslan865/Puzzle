<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidsPaint Puzzle</title>
<style>
body { font-family:sans-serif; text-align:center; background:#f0f0f0; }
#puzzleContainer { position:relative; display:inline-block; margin-top:20px; border:2px solid #333; }
.piece { position:absolute; cursor:grab; border:1px solid #ccc; }
#controls { margin-top:20px; }
</style>
</head>
<body>

<h1>KidsPaint Puzzle</h1>
<p>Klikləyin və şəkil parçalanacaq, sonra yığmağa başlayın!</p>

<div id="puzzleContainer"></div>

<div id="controls">
  <button id="startBtn">Dağıt / Puzzle Başlat</button>
  <button id="playMusic">Musiqi Çal</button>
  <button id="pauseMusic">Musiqi Dayandır</button>
</div>

<audio id="bgMusic" loop>
  <source src="baby3.mp3" type="audio/mpeg">
  Your browser does not support audio.
</audio>

<!-- AdSense Bloku -->
<div style="margin-top:20px;">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
<ins class="adsbygoogle"
     style="display:block; text-align:center;"
     data-ad-format="fluid"
     data-ad-layout-key="-gw-3+1f-3d+2z"
     data-ad-client="ca-pub-5792316003423969"
     data-ad-slot="1663173951"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<script>
// Puzzle parametrləri
const imageSrc = 'train_colored.jpg'; // Rəngli şəkil
const rows = 3, cols = 3; 
const container = document.getElementById('puzzleContainer');
const startBtn = document.getElementById('startBtn');
let pieces = [];

function createPuzzle() {
    container.innerHTML = '';
    pieces = [];
    const img = new Image();
    img.src = imageSrc;
    img.onload = () => {
        const w = img.width / cols;
        const h = img.height / rows;
        container.style.width = img.width + 'px';
        container.style.height = img.height + 'px';
        
        for (let r=0;r<rows;r++){
            for (let c=0;c<cols;c++){
                const piece = document.createElement('div');
                piece.className='piece';
                piece.style.width = w + 'px';
                piece.style.height = h + 'px';
                piece.style.backgroundImage = `url(${imageSrc})`;
                piece.style.backgroundPosition = `-${c*w}px -${r*h}px`;
                piece.style.left = Math.random()*(img.width-w) + 'px';
                piece.style.top = Math.random()*(img.height-h) + 'px';
                piece.dataset.row = r;
                piece.dataset.col = c;
                container.appendChild(piece);
                pieces.push(piece);
                makeDraggable(piece);
            }
        }
    };
}

// Drag-and-drop funksiyası
function makeDraggable(el){
    let offsetX, offsetY, dragging=false;
    el.addEventListener('mousedown', e=>{
        dragging=true;
        offsetX = e.offsetX;
        offsetY = e.offsetY;
        el.style.cursor='grabbing';
    });
    document.addEventListener('mousemove', e=>{
        if(!dragging) return;
        el.style.left = (e.clientX - container.getBoundingClientRect().left - offsetX) + 'px';
        el.style.top = (e.clientY - container.getBoundingClientRect().top - offsetY) + 'px';
    });
    document.addEventListener('mouseup', ()=>{
        if(dragging){
            dragging=false;
            el.style.cursor='grab';
            checkPuzzle();
        }
    });
}

// Puzzle tamamlanma yoxlaması
function checkPuzzle(){
    const img = new Image();
    img.src = imageSrc;
    const w = img.width / cols;
    const h = img.height / rows;
    let correct = true;
    pieces.forEach(p=>{
        const left = parseInt(p.style.left);
        const top = parseInt(p.style.top);
        const targetLeft = p.dataset.col * w;
        const targetTop = p.dataset.row * h;
        if(Math.abs(left - targetLeft) > 10 || Math.abs(top - targetTop) >10){
            correct = false;
        }
    });
    if(correct){
        document.getElementById('bgMusic').play();
        showMotivation();
        alert('Təbrik! Puzzle tamamlandı!');
    }
}

// Motivasiya effekti
function showMotivation(){
    for(let i=0;i<20;i++){
        const star = document.createElement('div');
        star.textContent='⭐';
        star.style.position='absolute';
        star.style.left = Math.random()*container.clientWidth+'px';
        star.style.top = '-30px';
        star.style.fontSize = (20+Math.random()*20)+'px';
        star.style.opacity = 0.8;
        container.appendChild(star);

        star.animate([
            { transform: 'translateY(0px)', opacity: 1 },
            { transform: 'translateY(200px)', opacity: 0 }
        ], {
            duration: 2000 + Math.random()*1000,
            easing: 'ease-out'
        });

        setTimeout(()=>container.removeChild(star), 3000);
    }
}

startBtn.onclick = createPuzzle;
document.getElementById('playMusic').onclick = ()=>{document.getElementById('bgMusic').play();}
document.getElementById('pauseMusic').onclick = ()=>{document.getElementById('bgMusic').pause();}

</script>
</body>
</html>
