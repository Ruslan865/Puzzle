<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidsPaint Puzzle</title>
<style>
body { font-family:sans-serif; text-align:center; background:#f0f0f0; margin:0; padding:0; }
#puzzleContainer { position:relative; display:inline-block; margin-top:20px; border:2px solid #333; touch-action: none; }
.piece { position:absolute; cursor:grab; border:1px solid #ccc; touch-action:none; }
#controls{ margin-top:20px; }
</style>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5792316003423969"
crossorigin="anonymous"></script>

</head>
<body>

<h1>KidsPaint Puzzle</h1>
<p>Klikləyin və şəkil parçalanacaq, sonra yığmağa başlayın!</p>

<div id="puzzleContainer"></div>

<div id="controls">
  <button id="startBtn">Dağıt / Puzzle Başlat</button>
  <button id="playMusic">Musiqi Çal</button>
  <button id="pauseMusic">Musiqi Dayandır</button>
</div>

<audio id="bgMusic" loop>
  <source src="baby3.mp3" type="audio/mpeg">
</audio>

<!-- AdSense Bloku -->
<div style="margin-top:20px">
  <ins class="adsbygoogle"
       style="display:block; text-align:center;"
       data-ad-format="fluid"
       data-ad-layout-key="-gw-3+1f-3d+2z"
       data-ad-client="ca-pub-5792316003423969"
       data-ad-slot="1663173951"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

<script>
// Puzzle parametrləri
const imageSrc = "whale1.jpg"; // Rəngli şəkil
const rows = 3, cols = 3;
const container = document.getElementById("puzzleContainer");
const startBtn = document.getElementById("startBtn");
const pieces = [];

let draggingPiece = null;
let offsetX = 0, offsetY = 0;

// Puzzle yarat
function createPuzzle() {
    container.innerHTML = '';
    pieces.length = 0;

    const img = new Image();
    img.src = imageSrc;
    img.onload = () => {
        const imgWidth = img.naturalWidth;
        const imgHeight = img.naturalHeight;
        container.style.width = imgWidth + "px";
        container.style.height = imgHeight + "px";

        const pieceWidth = imgWidth / cols;
        const pieceHeight = imgHeight / rows;

        for(let r=0; r<rows; r++){
            for(let c=0; c<cols; c++){
                const piece = document.createElement("div");
                piece.className = "piece";
                piece.style.width = pieceWidth + "px";
                piece.style.height = pieceHeight + "px";
                piece.style.backgroundImage = `url(${imageSrc})`;
                piece.style.backgroundPosition = `-${c*pieceWidth}px -${r*pieceHeight}px`;
                piece.style.left = Math.random()*(imgWidth-pieceWidth) + "px";
                piece.style.top = Math.random()*(imgHeight-pieceHeight) + "px";
                piece.dataset.row = r;
                piece.dataset.col = c;
                container.appendChild(piece);
                pieces.push(piece);
                makeDraggable(piece);
            }
        }
    }
}

// Drag funksiyası (mouse + touch)
function makeDraggable(piece){
    piece.addEventListener("mousedown", startDrag);
    piece.addEventListener("touchstart", startDrag);
}

function startDrag(e){
    e.preventDefault();
    draggingPiece = e.currentTarget;
    draggingPiece.style.cursor = "grabbing";

    const rect = draggingPiece.getBoundingClientRect();
    const containerRect = container.getBoundingClientRect();
    const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
    const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;

    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;
}

function moveDrag(e){
    if(!draggingPiece) return;
    const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
    const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
    const containerRect = container.getBoundingClientRect();

    let left = clientX - containerRect.left - offsetX;
    let top = clientY - containerRect.top - offsetY;

    // Puzzle içindən çıxmasın
    left = Math.max(0, Math.min(left, container.clientWidth - draggingPiece.offsetWidth));
    top = Math.max(0, Math.min(top, container.clientHeight - draggingPiece.offsetHeight));

    draggingPiece.style.left = left + "px";
    draggingPiece.style.top = top + "px";
}

function endDrag(e){
    if(draggingPiece){
        draggingPiece.style.cursor = "grab";
        draggingPiece = null;
        checkPuzzle();
    }
}

// Puzzle tamamlanma yoxlaması
function checkPuzzle(){
    const imgWidth = container.clientWidth / cols;
    const imgHeight = container.clientHeight / rows;

    let correct = true;
    pieces.forEach(p=>{
        const left = parseFloat(p.style.left);
        const top = parseFloat(p.style.top);
        const targetLeft = p.dataset.col * imgWidth;
        const targetTop = p.dataset.row * imgHeight;
        if(Math.abs(left - targetLeft) > 10 || Math.abs(top - targetTop) > 10){
            correct = false;
        }
    });

    if(correct){
        document.getElementById("bgMusic").play();
        showMotivation();
        alert("Təbrik! Puzzle tamamlandı!");
    }
}

// Motivasiya effekti
function showMotivation(){
    for(let i=0;i<20;i++){
        const star = document.createElement("div");
        star.textContent = "⭐";
        star.style.position = "absolute";
        star.style.left = Math.random()*container.clientWidth + "px";
        star.style.top = "-30px";
        star.style.fontSize = (20 + Math.random()*20) + "px";
        star.style.opacity = 0.8;
        container.appendChild(star);

        star.animate([
            { transform: "translateY(0px)", opacity:1 },
            { transform: "translateY(200px)", opacity:0 }
        ], {
            duration: 2000 + Math.random()*1000,
            easing: "ease-out"
        });

        setTimeout(()=>container.removeChild(star),3000);
    }
}

// Event-lar
startBtn.onclick = createPuzzle;

document.addEventListener("mousemove", moveDrag);
document.addEventListener("touchmove", moveDrag);

document.addEventListener("mouseup", endDrag);
document.addEventListener("touchend", endDrag);

document.getElementById("playMusic").onclick = () => { document.getElementById("bgMusic").play(); };
document.getElementById("pauseMusic").onclick = () => { document.getElementById("bgMusic").pause(); };

</script>

</body>
</html>
